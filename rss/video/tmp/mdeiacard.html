<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>原生DOM操作构建卡片</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; }
        
        .media-card {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            max-width: 500px;
            margin: 0 auto 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        /* 通用行样式 */
        .info-row { margin-bottom: 10px; font-size: 15px; line-height: 1.6; }
        .label { font-weight: bold; color: #333; margin-right: 8px; }

        /* 演员链接样式 */
        .actor-link { color: #007BFF; text-decoration: none; }
        .actor-link:hover { text-decoration: underline; }
        
        /* 标签样式 */
        .tag-link { color: #555; text-decoration: none; background: #eee; padding: 2px 6px; border-radius: 4px; }
        .tag-link:hover { background: #ddd; }

        /* 简介样式 */
        .description-box { margin-top: 15px; padding-top: 10px; border-top: 1px solid #eee; }
        .description-box h4 { margin: 0 0 8px 0; font-size: 16px; color: #333; }
        .description-text { color: #666; font-size: 14px; line-height: 1.5; margin: 0; }
    </style>
</head>
<body>

    <div id="app"></div>

    <script>
        function createMediaCard(data) {
            const card = document.createElement('div');
            card.className = 'media-card';

            // --- 1. 时间部分 ---
            // 判断：数据存在
            if (data.time) {
                const timeRow = document.createElement('div');
                timeRow.className = 'info-row';
                
                // 创建标签文本节点
                const labelSpan = document.createElement('span');
                labelSpan.className = 'label';
                labelSpan.textContent = '时间：';
                
                // 创建时间文本节点 (不再使用 <time> 标签，也不使用 innerHTML)
                const timeText = document.createTextNode(data.time);
                
                timeRow.appendChild(labelSpan);
                timeRow.appendChild(timeText);
                card.appendChild(timeRow);
            }

            // --- 2. 演员部分 ---
            // 判断：是数组 且 长度大于0
            if (Array.isArray(data.actors) && data.actors.length > 0) {
                const actorsRow = document.createElement('div');
                actorsRow.className = 'info-row';
                
                const actorsLabel = document.createElement('span');
                actorsLabel.className = 'label';
                actorsLabel.textContent = '演员：';
                actorsRow.appendChild(actorsLabel);

                data.actors.forEach((actor, index) => {
                    // 逻辑：有链接用 <a>，无链接用 <span>
                    if (actor.href) {
                        const link = document.createElement('a');
                        link.href = actor.href;
                        link.className = 'actor-link';
                        link.textContent = actor.name;
                        actorsRow.appendChild(link);
                    } else {
                        const text = document.createElement('span');
                        text.textContent = actor.name;
                        actorsRow.appendChild(text);
                    }

                    // 分隔符： / 
                    if (index < data.actors.length - 1) {
                        actorsRow.appendChild(document.createTextNode(' / '));
                    }
                });
                card.appendChild(actorsRow);
            }

            // --- 3. 标签部分 ---
            // 判断：是数组 且 长度大于0
            if (Array.isArray(data.tags) && data.tags.length > 0) {
                const tagsRow = document.createElement('div');
                tagsRow.className = 'info-row';

                const tagsLabel = document.createElement('span');
                tagsLabel.className = 'label';
                tagsLabel.textContent = '标签：';
                tagsRow.appendChild(tagsLabel);

                data.tags.forEach((tag, index) => {
                    // 逻辑：有链接用 <a>，无链接用 <span>
                    if (tag.href) {
                        const link = document.createElement('a');
                        link.href = tag.href;
                        link.className = 'tag-link';
                        link.textContent = tag.name;
                        tagsRow.appendChild(link);
                    } else {
                        const text = document.createElement('span');
                        text.textContent = tag.name;
                        tagsRow.appendChild(text);
                    }

                    // 分隔符：空格
                    if (index < data.tags.length - 1) {
                        tagsRow.appendChild(document.createTextNode(' '));
                    }
                });
                card.appendChild(tagsRow);
            }

            // --- 4. 简介部分 ---
            // 判断：数据存在
            if (data.description) {
                const descBox = document.createElement('div');
                descBox.className = 'description-box';
                
                const descTitle = document.createElement('h4');
                descTitle.textContent = '简介';
                descBox.appendChild(descTitle);

                const descText = document.createElement('p');
                descText.className = 'description-text';
                descText.textContent = data.description;
                descBox.appendChild(descText);

                card.appendChild(descBox);
            }

            return card;
        }

        // --- 测试数据 ---

        // 场景 1: 数据完整
        const fullData = {
            time: '2026-04-06 17:00',
            actors: [
                { name: '基努·里维斯', href: '/actor/keanu' },
                { name: '凯瑞-安·莫斯' } // 无链接
            ],
            tags: [
                { name: '科幻', href: '/tag/scifi' },
                { name: '动作' }
            ],
            description: '这是使用原生 DOM 方法构建的完整卡片。'
        };

        // 场景 2: 数据缺失
        const partialData = {
            time: '', // 空，不显示
            actors: [], // 空，不显示
            tags: [ { name: '仅标签' } ],
            description: null // 空，不显示
        };

        // 渲染
        document.getElementById('app').appendChild(createMediaCard(fullData));
        document.getElementById('app').appendChild(createMediaCard(partialData));

    </script>
</body>
</html>
